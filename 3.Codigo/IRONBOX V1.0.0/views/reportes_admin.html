<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>IronClad Box | Reportes administrativos</title>
    <link rel="stylesheet" href="../assets/css/nav.css?v=5">
    <link rel="stylesheet" href="../assets/css/app.css?v=5">
</head>
<body>
    <header>
        <h1>Reportes administrativos</h1>
        <p>Filtra por tipo y rango de fechas para consolidar finanzas y asistencia, luego exporta el resultado.</p>
    </header>

    <main class="split">
        <section class="col-form panel" aria-labelledby="filters-title">
            <div class="panel-header">
                <h2 id="filters-title">Filtros del reporte</h2>
            </div>

            <form id="reporteForm">
                <label for="tipoReporte">Tipo de reporte <span class="req">*</span>
                    <select id="tipoReporte" required>
                        <option value="Finanzas">Finanzas</option>
                        <option value="Asistencia">Asistencia</option>
                    </select>
                </label>

                <div class="form-row">
                    <label for="fechaInicio">Fecha inicio <span class="req">*</span>
                        <input type="date" id="fechaInicio" required>
                    </label>

                    <label for="fechaFin">Fecha fin <span class="req">*</span>
                        <input type="date" id="fechaFin" required>
                    </label>
                </div>

                <span class="help">Los datos incluyen desde la fecha de inicio hasta la fecha de fin, ambas inclusive.</span>

                <div class="actions">
                    <button type="submit" class="primary" id="generateButton">Generar</button>
                    <button type="button" class="secondary btn-sm" id="csvButton">Exportar CSV</button>
                    <button type="button" class="secondary btn-sm" id="pdfButton">Exportar PDF</button>
                </div>
            </form>

            <p class="status" id="statusMessage" role="status" aria-live="polite"></p>
        </section>

        <section class="panel" aria-labelledby="results-title" id="printArea">
            <div class="panel-header">
                <h2 id="results-title">Resultados preliminares</h2>
            </div>

            <div class="panel-body">
                <div class="metrics" id="summary"></div>
            </div>

            <div class="table-wrap">
                <table>
                    <thead>
                        <tr id="tableHead"></tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>

            <div class="empty" id="emptyState">Seleccione filtros y genere un reporte.</div>
        </section>
    </main>

    <script src="../assets/js/nav.js?v=5"></script>
    <script src="../assets/js/reportes_admin.js?v=5"></script>
</body>
</html>
