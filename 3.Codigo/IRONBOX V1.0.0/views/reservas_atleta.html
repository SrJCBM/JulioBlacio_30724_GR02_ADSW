<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>IronClad Box | Reservas de clases</title>
    <style>
        :root {
            --bg: #f4f6f8;
            --panel: #ffffff;
            --ink: #1f252c;
            --muted: #68717d;
            --line: #dce2e8;
            --brand: #b8232f;
            --brand-dark: #8e1923;
            --focus: #1f6feb;
            --ok: #137333;
            --danger: #b42318;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--ink);
            font-family: Arial, Helvetica, sans-serif;
            line-height: 1.45;
        }

        header {
            background: #20242a;
            color: #fff;
            padding: 18px clamp(16px, 4vw, 48px);
        }

        header h1 {
            margin: 0;
            font-size: clamp(1.35rem, 2vw, 2rem);
            letter-spacing: 0;
        }

        main {
            width: min(1180px, calc(100% - 32px));
            margin: 24px auto 42px;
            display: grid;
            gap: 22px;
        }

        .panel {
            min-width: 0;
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 8px;
            box-shadow: 0 6px 18px rgba(31, 35, 40, 0.06);
        }

        .panel-header {
            padding: 18px 20px 12px;
            border-bottom: 1px solid var(--line);
            display: flex;
            gap: 14px;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
        }

        .panel-header h2 {
            margin: 0;
            font-size: 1.05rem;
            letter-spacing: 0;
        }

        .toolbar {
            padding: 18px 20px 20px;
            display: grid;
            grid-template-columns: minmax(220px, 360px) auto;
            gap: 14px;
            align-items: end;
        }

        label {
            display: grid;
            gap: 6px;
            color: var(--muted);
            font-size: 0.9rem;
            font-weight: 700;
        }

        select {
            width: 100%;
            min-height: 42px;
            border: 1px solid #c8d0da;
            border-radius: 6px;
            padding: 9px 10px;
            color: var(--ink);
            background: #fff;
            font: inherit;
        }

        select:focus,
        button:focus {
            outline: 3px solid rgba(31, 111, 235, 0.22);
            outline-offset: 1px;
            border-color: var(--focus);
        }

        button {
            min-height: 40px;
            border: 1px solid transparent;
            border-radius: 6px;
            padding: 9px 14px;
            cursor: pointer;
            font: inherit;
            font-weight: 700;
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.56;
        }

        .primary {
            background: var(--brand);
            color: #fff;
        }

        .primary:hover {
            background: var(--brand-dark);
        }

        .secondary {
            background: #fff;
            color: var(--ink);
            border-color: #c8d0da;
        }

        .secondary:hover {
            background: #f1f3f5;
        }

        .danger {
            background: #fff;
            color: var(--danger);
            border-color: #e7b9b5;
        }

        .danger:hover {
            background: #fff3f1;
        }

        .status {
            display: none;
            margin: 0 20px 18px;
            padding: 11px 12px;
            border-radius: 6px;
            font-weight: 700;
        }

        .status.show {
            display: block;
        }

        .status.ok {
            color: var(--ok);
            background: #eaf5ed;
            border: 1px solid #bddfc7;
        }

        .status.error {
            color: var(--danger);
            background: #fff0ef;
            border: 1px solid #f0b8b4;
        }

        .table-wrap {
            width: 100%;
            overflow-x: auto;
        }

        table {
            width: 100%;
            min-width: 840px;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 12px 14px;
            border-bottom: 1px solid var(--line);
            text-align: left;
            vertical-align: middle;
        }

        th {
            color: var(--muted);
            background: #fafbfc;
            font-size: 0.82rem;
            text-transform: uppercase;
            letter-spacing: 0;
        }

        tbody tr:hover {
            background: #fafafa;
        }

        .tag {
            display: inline-flex;
            align-items: center;
            min-height: 28px;
            border-radius: 999px;
            padding: 4px 10px;
            color: #38414c;
            background: #eef2f6;
            font-size: 0.86rem;
            font-weight: 700;
            white-space: nowrap;
        }

        .empty {
            padding: 24px 20px;
            color: var(--muted);
        }

        @media (max-width: 700px) {
            main {
                width: min(100% - 20px, 1180px);
                margin-top: 14px;
            }

            .toolbar {
                grid-template-columns: 1fr;
            }

            .toolbar button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>IronClad Box - Reservas de clases</h1>
    </header>

    <main>
        <section class="panel" aria-labelledby="selector-title">
            <div class="panel-header">
                <h2 id="selector-title">Atleta</h2>
            </div>
            <div class="toolbar">
                <label for="idAtleta">
                    Seleccione atleta
                    <select id="idAtleta">
                        <option value="">Seleccione un atleta</option>
                    </select>
                </label>
                <button type="button" class="secondary" id="refreshButton">Actualizar</button>
            </div>
            <p class="status" id="statusMessage" role="status" aria-live="polite"></p>
        </section>

        <section class="panel" aria-labelledby="clases-title">
            <div class="panel-header">
                <h2 id="clases-title">Clases disponibles</h2>
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Fecha</th>
                            <th>Hora</th>
                            <th>Duracion</th>
                            <th>Cupos</th>
                            <th>Entrenador</th>
                            <th>Accion</th>
                        </tr>
                    </thead>
                    <tbody id="clasesBody"></tbody>
                </table>
            </div>
            <div class="empty" id="clasesEmpty">Seleccione un atleta para ver clases disponibles.</div>
        </section>

        <section class="panel" aria-labelledby="reservas-title">
            <div class="panel-header">
                <h2 id="reservas-title">Mis reservas activas</h2>
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Fecha</th>
                            <th>Hora</th>
                            <th>Clase</th>
                            <th>Reserva</th>
                            <th>Estado</th>
                            <th>Accion</th>
                        </tr>
                    </thead>
                    <tbody id="reservasBody"></tbody>
                </table>
            </div>
            <div class="empty" id="reservasEmpty">Seleccione un atleta para ver sus reservas.</div>
        </section>
    </main>

    <script src="../assets/js/reservas.js"></script>
</body>
</html>
