<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>IronClad Box | Gestion de clases</title>
    <link rel="stylesheet" href="../assets/css/nav.css">
    <style>
        :root {
            --bg: #f6f7f9;
            --panel: #ffffff;
            --ink: #1e2329;
            --muted: #68717d;
            --line: #dfe4ea;
            --brand: #b8232f;
            --brand-dark: #8e1923;
            --focus: #1f6feb;
            --ok: #137333;
            --warn: #9a5a00;
            --danger: #b42318;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--ink);
            font-family: Arial, Helvetica, sans-serif;
            line-height: 1.45;
        }

        header {
            background: #20242a;
            color: #fff;
            padding: 18px clamp(16px, 4vw, 48px);
        }

        header h1 {
            margin: 0;
            font-size: clamp(1.35rem, 2vw, 2rem);
            font-weight: 700;
            letter-spacing: 0;
        }

        main {
            width: min(1180px, calc(100% - 32px));
            margin: 24px auto 42px;
            display: grid;
            grid-template-columns: 360px minmax(0, 1fr);
            gap: 22px;
            align-items: start;
        }

        section {
            min-width: 0;
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 8px;
            box-shadow: 0 6px 18px rgba(31, 35, 40, 0.06);
        }

        .panel-header {
            padding: 18px 20px 12px;
            border-bottom: 1px solid var(--line);
        }

        .panel-header h2 {
            margin: 0;
            font-size: 1.05rem;
            letter-spacing: 0;
        }

        form {
            padding: 18px 20px 20px;
            display: grid;
            gap: 14px;
        }

        label {
            display: grid;
            gap: 6px;
            color: var(--muted);
            font-size: 0.9rem;
            font-weight: 700;
        }

        input,
        select {
            width: 100%;
            min-height: 42px;
            border: 1px solid #c8d0da;
            border-radius: 6px;
            padding: 9px 10px;
            color: var(--ink);
            background: #fff;
            font: inherit;
        }

        input:focus,
        select:focus,
        button:focus {
            outline: 3px solid rgba(31, 111, 235, 0.22);
            outline-offset: 1px;
            border-color: var(--focus);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            padding-top: 4px;
        }

        button {
            min-height: 40px;
            border: 1px solid transparent;
            border-radius: 6px;
            padding: 9px 14px;
            cursor: pointer;
            font: inherit;
            font-weight: 700;
        }

        .primary {
            background: var(--brand);
            color: #fff;
        }

        .primary:hover {
            background: var(--brand-dark);
        }

        .secondary {
            background: #fff;
            color: var(--ink);
            border-color: #c8d0da;
        }

        .secondary:hover {
            background: #f1f3f5;
        }

        .danger {
            background: #fff;
            color: var(--danger);
            border-color: #e7b9b5;
        }

        .danger:hover {
            background: #fff3f1;
        }

        .status {
            display: none;
            margin: 0 20px 18px;
            padding: 11px 12px;
            border-radius: 6px;
            font-weight: 700;
        }

        .status.show {
            display: block;
        }

        .status.ok {
            color: var(--ok);
            background: #eaf5ed;
            border: 1px solid #bddfc7;
        }

        .status.error {
            color: var(--danger);
            background: #fff0ef;
            border: 1px solid #f0b8b4;
        }

        .table-wrap {
            width: 100%;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 760px;
        }

        th,
        td {
            padding: 12px 14px;
            border-bottom: 1px solid var(--line);
            text-align: left;
            vertical-align: middle;
        }

        th {
            color: var(--muted);
            background: #fafbfc;
            font-size: 0.82rem;
            text-transform: uppercase;
            letter-spacing: 0;
        }

        tbody tr:hover {
            background: #fafafa;
        }

        .tag {
            display: inline-flex;
            align-items: center;
            min-height: 28px;
            border-radius: 999px;
            padding: 4px 10px;
            background: #eef2f6;
            color: #38414c;
            font-size: 0.86rem;
            font-weight: 700;
            white-space: nowrap;
        }

        .row-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .empty {
            padding: 24px 20px;
            color: var(--muted);
        }

        @media (max-width: 920px) {
            main {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 560px) {
            main {
                width: min(100% - 20px, 1180px);
                margin-top: 14px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .actions button {
                width: 100%;
            }
        }
    </style>
    <link rel="stylesheet" href="../assets/css/app.css">
</head>
<body>
    <header>
        <h1>IronClad Box - Gestion de clases</h1>
    </header>

    <main>
        <section class="panel" aria-labelledby="form-title">
            <div class="panel-header">
                <h2 id="form-title">Nueva clase</h2>
            </div>

            <form id="claseForm" autocomplete="off">
                <input type="hidden" id="claseId" name="id">

                <div class="form-row">
                    <label for="dia">
                        Dia
                        <input type="date" id="dia" name="dia" required>
                    </label>

                    <label for="hora">
                        Hora
                        <input type="time" id="hora" name="hora" required>
                    </label>
                </div>

                <div class="form-row">
                    <label for="duracion">
                        Duracion
                        <input type="number" id="duracion" name="duracion" min="1" max="240" value="60" required>
                    </label>

                    <label for="cupoMaximo">
                        Cupo maximo
                        <input type="number" id="cupoMaximo" name="cupoMaximo" min="1" max="30" value="12" required>
                    </label>
                </div>

                <label for="entrenadorId">
                    Entrenador asignado
                    <select id="entrenadorId" name="entrenadorId" required>
                        <option value="">Seleccione un entrenador</option>
                    </select>
                </label>

                <div class="actions">
                    <button type="submit" class="primary" id="submitButton">Guardar clase</button>
                    <button type="button" class="secondary" id="cancelButton" hidden>Cancelar edicion</button>
                </div>
            </form>

            <p class="status" id="statusMessage" role="status" aria-live="polite"></p>
        </section>

        <section class="panel" aria-labelledby="table-title">
            <div class="panel-header">
                <h2 id="table-title">Agenda programada</h2>
            </div>

            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Fecha</th>
                            <th>Hora</th>
                            <th>Duracion</th>
                            <th>Cupos</th>
                            <th>Entrenador</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="clasesBody"></tbody>
                </table>
            </div>

            <div class="empty" id="emptyState" hidden>No hay clases registradas.</div>
        </section>
    </main>
    <script src="../assets/js/nav.js"></script>

    <script src="../assets/js/app.js"></script>
</body>
</html>
