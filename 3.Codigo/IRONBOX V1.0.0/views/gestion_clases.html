<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>IronClad Box | Gestion de clases</title>
    <link rel="stylesheet" href="../assets/css/nav.css?v=5">
    <link rel="stylesheet" href="../assets/css/app.css?v=5">
</head>
<body>
    <header>
        <h1>Gestion de clases</h1>
        <p>Programa la agenda del box y asigna entrenadores sin solapar horarios.</p>
    </header>

    <main>
        <p class="status" id="statusMessage" role="status" aria-live="polite"></p>

        <section class="panel" aria-labelledby="table-title">
            <div class="panel-header">
                <h2 id="table-title">Agenda programada</h2>
                <button type="button" class="primary btn-sm" id="nuevaClaseButton">+ Nueva clase</button>
            </div>

            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Fecha</th>
                            <th>Hora</th>
                            <th>Duracion</th>
                            <th>Cupos</th>
                            <th>Entrenador</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="clasesBody"></tbody>
                </table>
            </div>

            <div class="empty" id="emptyState" hidden>No hay clases registradas todavia.</div>
        </section>
    </main>

    <div class="drawer-scrim" id="drawerScrim"></div>
    <aside class="drawer" id="formDrawer" role="dialog" aria-modal="true" aria-labelledby="form-title" aria-hidden="true">
        <div class="drawer-header">
            <h2 id="form-title">Nueva clase</h2>
            <button type="button" class="drawer-close" id="drawerClose" aria-label="Cerrar formulario">&times;</button>
        </div>

        <form id="claseForm" autocomplete="off">
            <input type="hidden" id="claseId" name="id">

            <div class="form-row">
                <label for="dia">Dia <span class="req">*</span>
                    <input type="date" id="dia" name="dia" required>
                </label>
                <label for="hora">Hora <span class="req">*</span>
                    <input type="time" id="hora" name="hora" required>
                </label>
            </div>

            <div class="form-row">
                <label for="duracion">Duracion (min) <span class="req">*</span>
                    <input type="number" id="duracion" name="duracion" min="1" max="240" value="60" required>
                </label>
                <label for="cupoMaximo">Cupo maximo <span class="req">*</span>
                    <input type="number" id="cupoMaximo" name="cupoMaximo" min="1" max="30" value="12" required>
                </label>
            </div>

            <label for="entrenadorId" id="entrenadorField">Entrenador asignado <span class="req">*</span>
                <select id="entrenadorId" name="entrenadorId" required>
                    <option value="">Seleccione un entrenador</option>
                </select>
                <span class="help">Solo se listan entrenadores disponibles.</span>
            </label>

            <p class="help" id="entrenadorPropioAviso" hidden>La clase se registrara a tu nombre automaticamente.</p>

            <div class="actions">
                <button type="submit" class="primary" id="submitButton">Guardar clase</button>
                <button type="button" class="secondary" id="cancelButton" hidden>Cancelar edicion</button>
            </div>
        </form>
    </aside>

    <script src="../assets/js/nav.js?v=5"></script>
    <script src="../assets/js/app.js?v=5"></script>
</body>
</html>
