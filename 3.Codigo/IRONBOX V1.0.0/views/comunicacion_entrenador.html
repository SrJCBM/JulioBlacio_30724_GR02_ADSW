<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>IronClad Box | Comunicacion</title>
    <style>
        :root {
            --bg: #f4f6f8;
            --panel: #ffffff;
            --ink: #1f252c;
            --muted: #68717d;
            --line: #dce2e8;
            --brand: #b8232f;
            --brand-dark: #8e1923;
            --focus: #1f6feb;
            --ok: #137333;
            --danger: #b42318;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--ink);
            font-family: Arial, Helvetica, sans-serif;
            line-height: 1.45;
        }

        header {
            background: #20242a;
            color: #fff;
            padding: 18px clamp(16px, 4vw, 48px);
        }

        header h1 {
            margin: 0;
            font-size: clamp(1.35rem, 2vw, 2rem);
            letter-spacing: 0;
        }

        main {
            width: min(1180px, calc(100% - 32px));
            margin: 24px auto 42px;
            display: grid;
            grid-template-columns: 380px minmax(0, 1fr);
            gap: 22px;
            align-items: start;
        }

        .panel {
            min-width: 0;
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 8px;
            box-shadow: 0 6px 18px rgba(31, 35, 40, 0.06);
        }

        .panel-header {
            padding: 18px 20px 12px;
            border-bottom: 1px solid var(--line);
        }

        .panel-header h2 {
            margin: 0;
            font-size: 1.05rem;
            letter-spacing: 0;
        }

        form {
            padding: 18px 20px 20px;
            display: grid;
            gap: 14px;
        }

        label {
            display: grid;
            gap: 6px;
            color: var(--muted);
            font-size: 0.9rem;
            font-weight: 700;
        }

        select,
        textarea {
            width: 100%;
            min-height: 42px;
            border: 1px solid #c8d0da;
            border-radius: 6px;
            padding: 9px 10px;
            color: var(--ink);
            background: #fff;
            font: inherit;
        }

        textarea {
            min-height: 150px;
            resize: vertical;
        }

        select:focus,
        textarea:focus,
        button:focus {
            outline: 3px solid rgba(31, 111, 235, 0.22);
            outline-offset: 1px;
            border-color: var(--focus);
        }

        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            min-height: 40px;
            border: 1px solid transparent;
            border-radius: 6px;
            padding: 9px 14px;
            cursor: pointer;
            font: inherit;
            font-weight: 700;
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.56;
        }

        .primary {
            background: var(--brand);
            color: #fff;
        }

        .primary:hover {
            background: var(--brand-dark);
        }

        .secondary {
            background: #fff;
            color: var(--ink);
            border-color: #c8d0da;
        }

        .status {
            display: none;
            margin: 0 20px 18px;
            padding: 11px 12px;
            border-radius: 6px;
            font-weight: 700;
        }

        .status.show {
            display: block;
        }

        .status.ok {
            color: var(--ok);
            background: #eaf5ed;
            border: 1px solid #bddfc7;
        }

        .status.error {
            color: var(--danger);
            background: #fff0ef;
            border: 1px solid #f0b8b4;
        }

        .table-wrap {
            width: 100%;
            overflow-x: auto;
        }

        table {
            width: 100%;
            min-width: 760px;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 12px 14px;
            border-bottom: 1px solid var(--line);
            text-align: left;
            vertical-align: top;
        }

        th {
            color: var(--muted);
            background: #fafbfc;
            font-size: 0.82rem;
            text-transform: uppercase;
            letter-spacing: 0;
        }

        .tag {
            display: inline-flex;
            align-items: center;
            min-height: 28px;
            border-radius: 999px;
            padding: 4px 10px;
            background: #eef2f6;
            color: #38414c;
            font-size: 0.86rem;
            font-weight: 700;
            white-space: nowrap;
        }

        .empty {
            padding: 24px 20px;
            color: var(--muted);
        }

        @media (max-width: 940px) {
            main {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 560px) {
            main {
                width: min(100% - 20px, 1180px);
                margin-top: 14px;
            }

            .actions button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>IronClad Box - Comunicacion del entrenador</h1>
    </header>

    <main>
        <section class="panel" aria-labelledby="form-title">
            <div class="panel-header">
                <h2 id="form-title">Nuevo mensaje</h2>
            </div>

            <form id="mensajeForm" autocomplete="off">
                <label for="idEntrenador">
                    Entrenador
                    <select id="idEntrenador" required>
                        <option value="">Seleccione entrenador</option>
                    </select>
                </label>

                <label for="tipo">
                    Tipo
                    <select id="tipo" required>
                        <option value="Mensaje">Mensaje individual</option>
                        <option value="Anuncio">Anuncio general</option>
                    </select>
                </label>

                <label for="idAtleta" id="atletaLabel">
                    Atleta destinatario
                    <select id="idAtleta">
                        <option value="">Seleccione atleta</option>
                    </select>
                </label>

                <label for="contenido">
                    Contenido
                    <textarea id="contenido" maxlength="1000" required></textarea>
                </label>

                <div class="actions">
                    <button type="submit" class="primary" id="submitButton">Enviar mensaje</button>
                    <button type="button" class="secondary" id="refreshButton">Actualizar historial</button>
                </div>
            </form>

            <p class="status" id="statusMessage" role="status" aria-live="polite"></p>
        </section>

        <section class="panel" aria-labelledby="historial-title">
            <div class="panel-header">
                <h2 id="historial-title">Historial enviado</h2>
            </div>

            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Fecha</th>
                            <th>Tipo</th>
                            <th>Destinatario</th>
                            <th>Contenido</th>
                        </tr>
                    </thead>
                    <tbody id="historialBody"></tbody>
                </table>
            </div>

            <div class="empty" id="emptyState">No hay mensajes enviados.</div>
        </section>
    </main>

    <script src="../assets/js/comunicacion_entrenador.js"></script>
</body>
</html>
