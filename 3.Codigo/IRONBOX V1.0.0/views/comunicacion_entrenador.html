<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>IronClad Box | Comunicacion</title>
    <link rel="stylesheet" href="../assets/css/nav.css?v=5">
    <link rel="stylesheet" href="../assets/css/app.css?v=5">
</head>
<body>
    <header>
        <h1>Comunicacion del entrenador</h1>
        <p>Envia mensajes individuales o anuncios generales y revisa el historial enviado.</p>
    </header>

    <main class="split">
        <section class="col-form panel" aria-labelledby="form-title">
            <div class="panel-header">
                <h2 id="form-title">Nuevo mensaje</h2>
            </div>

            <form id="mensajeForm" autocomplete="off">
                <label for="idEntrenador">Entrenador <span class="req">*</span>
                    <select id="idEntrenador" required>
                        <option value="">Seleccione entrenador</option>
                    </select>
                </label>

                <label for="tipo">Tipo <span class="req">*</span>
                    <select id="tipo" required>
                        <option value="Mensaje">Mensaje individual</option>
                        <option value="Anuncio">Anuncio general</option>
                    </select>
                    <span class="help">Los anuncios llegan a todos los atletas.</span>
                </label>

                <label for="idAtleta" id="atletaLabel">Atleta destinatario <span class="req">*</span>
                    <select id="idAtleta">
                        <option value="">Seleccione atleta</option>
                    </select>
                </label>

                <label for="contenido">Contenido <span class="req">*</span>
                    <textarea id="contenido" maxlength="1000" required></textarea>
                    <span class="help">Escribe un mensaje claro para seguimiento del atleta.</span>
                </label>

                <div class="actions">
                    <button type="submit" class="primary" id="submitButton">Enviar mensaje</button>
                    <button type="button" class="secondary" id="refreshButton">Actualizar historial</button>
                </div>
            </form>

            <p class="status" id="statusMessage" role="status" aria-live="polite"></p>
        </section>

        <section class="panel" aria-labelledby="historial-title">
            <div class="panel-header">
                <h2 id="historial-title">Historial enviado</h2>
            </div>

            <div class="table-wrap" role="region" aria-label="Historial de mensajes enviados">
                <table>
                    <thead>
                        <tr>
                            <th>Fecha</th>
                            <th>Tipo</th>
                            <th>Destinatario</th>
                            <th>Contenido</th>
                        </tr>
                    </thead>
                    <tbody id="historialBody"></tbody>
                </table>
            </div>

            <div class="empty" id="emptyState">No hay mensajes enviados.</div>
        </section>
    </main>

    <script src="../assets/js/nav.js?v=5"></script>
    <script src="../assets/js/comunicacion_entrenador.js?v=5"></script>
</body>
</html>
