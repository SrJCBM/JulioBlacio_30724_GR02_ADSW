<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>IronClad Box | Seguimiento deportivo</title>
    <link rel="stylesheet" href="../assets/css/nav.css?v=5">
    <link rel="stylesheet" href="../assets/css/app.css?v=5">
</head>
<body>
    <header>
        <h1>Seguimiento deportivo</h1>
        <p>Registra los resultados de WOD de tus atletas y controla su evolucion desde una sola vista.</p>
    </header>

    <main>
        <p class="status" id="statusMessage" role="status" aria-live="polite"></p>

        <section class="panel" aria-labelledby="table-title">
            <div class="panel-header">
                <h2 id="table-title">Historial del atleta</h2>
                <button type="button" class="primary btn-sm" id="nuevaRegistroButton">+ Registrar entrenamiento</button>
            </div>

            <div class="panel-body">
                <label for="idAtleta">Atleta <span class="req">*</span>
                    <select id="idAtleta">
                        <option value="">Seleccione un atleta</option>
                    </select>
                    <span class="help">El historial y la grafica se cargan al elegir un atleta.</span>
                </label>
            </div>

            <div class="chart-wrap" style="height: 320px;">
                <canvas id="graficoEvolucion"></canvas>
            </div>

            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Fecha</th>
                            <th>Tiempo</th>
                            <th>Reps</th>
                            <th>Peso</th>
                            <th>Puntuacion</th>
                            <th>Notas</th>
                        </tr>
                    </thead>
                    <tbody id="historialBody"></tbody>
                </table>
            </div>

            <div class="empty" id="emptyState">Seleccione un atleta para ver su historial.</div>
        </section>
    </main>

    <div class="drawer-scrim" id="drawerScrim"></div>
    <aside class="drawer" id="formDrawer" role="dialog" aria-modal="true" aria-labelledby="form-title" aria-hidden="true">
        <div class="drawer-header">
            <h2 id="form-title">Registrar entrenamiento</h2>
            <button type="button" class="drawer-close" id="drawerClose" aria-label="Cerrar formulario">&times;</button>
        </div>

        <form id="progresoForm" autocomplete="off">
            <label for="fecha">Fecha <span class="req">*</span>
                <input type="date" id="fecha" name="fecha" required>
            </label>

            <div class="form-row">
                <label for="tiempo">Tiempo
                    <input type="number" id="tiempo" name="tiempo" min="0.01" step="0.01" placeholder="Minutos">
                </label>

                <label for="repeticiones">Repeticiones
                    <input type="number" id="repeticiones" name="repeticiones" min="1" step="1">
                </label>
            </div>

            <div class="form-row">
                <label for="peso">Peso
                    <input type="number" id="peso" name="peso" min="0.01" step="0.01" placeholder="Kg">
                </label>

                <label for="puntuacion">Puntuacion
                    <input type="number" id="puntuacion" name="puntuacion" min="0" step="0.01" placeholder="Opcional">
                </label>
            </div>

            <label for="notas">Notas
                <textarea id="notas" name="notas" maxlength="500"></textarea>
            </label>

            <div class="actions">
                <button type="submit" class="primary" id="submitButton">Guardar resultado</button>
                <button type="button" class="secondary" id="clearButton">Limpiar</button>
            </div>
        </form>
    </aside>

    <script src="../assets/js/nav.js?v=5"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="../assets/js/progreso.js?v=5"></script>
</body>
</html>
