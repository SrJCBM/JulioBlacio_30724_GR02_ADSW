<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>IronClad Box | Seguimiento deportivo</title>
    <link rel="stylesheet" href="../assets/css/nav.css?v=2">
    <style>
        :root {
            --bg: #f4f6f8;
            --panel: #ffffff;
            --ink: #1f252c;
            --muted: #68717d;
            --line: #dce2e8;
            --brand: #b8232f;
            --brand-dark: #8e1923;
            --focus: #1f6feb;
            --ok: #137333;
            --danger: #b42318;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--ink);
            font-family: Arial, Helvetica, sans-serif;
            line-height: 1.45;
        }

        header {
            background: #20242a;
            color: #fff;
            padding: 18px clamp(16px, 4vw, 48px);
        }

        header h1 {
            margin: 0;
            font-size: clamp(1.35rem, 2vw, 2rem);
            letter-spacing: 0;
        }

        main {
            width: min(1180px, calc(100% - 32px));
            margin: 24px auto 42px;
            display: grid;
            grid-template-columns: 360px minmax(0, 1fr);
            gap: 22px;
            align-items: start;
        }

        .panel {
            min-width: 0;
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 8px;
            box-shadow: 0 6px 18px rgba(31, 35, 40, 0.06);
        }

        .panel-header {
            padding: 18px 20px 12px;
            border-bottom: 1px solid var(--line);
        }

        .panel-header h2 {
            margin: 0;
            font-size: 1.05rem;
            letter-spacing: 0;
        }

        form {
            padding: 18px 20px 20px;
            display: grid;
            gap: 14px;
        }

        label {
            display: grid;
            gap: 6px;
            color: var(--muted);
            font-size: 0.9rem;
            font-weight: 700;
        }

        input,
        select,
        textarea {
            width: 100%;
            min-height: 42px;
            border: 1px solid #c8d0da;
            border-radius: 6px;
            padding: 9px 10px;
            color: var(--ink);
            background: #fff;
            font: inherit;
        }

        textarea {
            min-height: 86px;
            resize: vertical;
        }

        input:focus,
        select:focus,
        textarea:focus,
        button:focus {
            outline: 3px solid rgba(31, 111, 235, 0.22);
            outline-offset: 1px;
            border-color: var(--focus);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            padding-top: 4px;
        }

        button {
            min-height: 40px;
            border: 1px solid transparent;
            border-radius: 6px;
            padding: 9px 14px;
            cursor: pointer;
            font: inherit;
            font-weight: 700;
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.56;
        }

        .primary {
            background: var(--brand);
            color: #fff;
        }

        .primary:hover {
            background: var(--brand-dark);
        }

        .secondary {
            background: #fff;
            color: var(--ink);
            border-color: #c8d0da;
        }

        .secondary:hover {
            background: #f1f3f5;
        }

        .status {
            display: none;
            margin: 0 20px 18px;
            padding: 11px 12px;
            border-radius: 6px;
            font-weight: 700;
        }

        .status.show {
            display: block;
        }

        .status.ok {
            color: var(--ok);
            background: #eaf5ed;
            border: 1px solid #bddfc7;
        }

        .status.error {
            color: var(--danger);
            background: #fff0ef;
            border: 1px solid #f0b8b4;
        }

        .table-wrap {
            width: 100%;
            overflow-x: auto;
        }

        .chart-wrap {
            height: 280px;
            padding: 18px 20px 8px;
        }

        .chart-wrap canvas {
            width: 100%;
            height: 100%;
        }

        table {
            width: 100%;
            min-width: 820px;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 12px 14px;
            border-bottom: 1px solid var(--line);
            text-align: left;
            vertical-align: middle;
        }

        th {
            color: var(--muted);
            background: #fafbfc;
            font-size: 0.82rem;
            text-transform: uppercase;
            letter-spacing: 0;
        }

        tbody tr:hover {
            background: #fafafa;
        }

        .score {
            display: inline-flex;
            align-items: center;
            min-height: 28px;
            border-radius: 999px;
            padding: 4px 10px;
            color: #38414c;
            background: #eef2f6;
            font-size: 0.86rem;
            font-weight: 700;
            white-space: nowrap;
        }

        .empty {
            padding: 24px 20px;
            color: var(--muted);
        }

        @media (max-width: 940px) {
            main {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 560px) {
            main {
                width: min(100% - 20px, 1180px);
                margin-top: 14px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .actions button {
                width: 100%;
            }
        }
    </style>
    <link rel="stylesheet" href="../assets/css/app.css?v=2">
</head>
<body>
    <header>
        <h1>IronClad Box - Seguimiento deportivo</h1>
    </header>

    <main>
        <section class="panel" aria-labelledby="form-title">
            <div class="panel-header">
                <h2 id="form-title">Registrar resultado WOD</h2>
            </div>

            <form id="progresoForm" autocomplete="off">
                <label for="idAtleta">
                    Atleta
                    <select id="idAtleta" name="idAtleta" required>
                        <option value="">Seleccione un atleta</option>
                    </select>
                </label>

                <label for="fecha">
                    Fecha
                    <input type="date" id="fecha" name="fecha" required>
                </label>

                <div class="form-row">
                    <label for="tiempo">
                        Tiempo
                        <input type="number" id="tiempo" name="tiempo" min="0.01" step="0.01" placeholder="Minutos">
                    </label>

                    <label for="repeticiones">
                        Repeticiones
                        <input type="number" id="repeticiones" name="repeticiones" min="1" step="1">
                    </label>
                </div>

                <div class="form-row">
                    <label for="peso">
                        Peso
                        <input type="number" id="peso" name="peso" min="0.01" step="0.01" placeholder="Kg">
                    </label>

                    <label for="puntuacion">
                        Puntuacion
                        <input type="number" id="puntuacion" name="puntuacion" min="0" step="0.01" placeholder="Opcional">
                    </label>
                </div>

                <label for="notas">
                    Notas
                    <textarea id="notas" name="notas" maxlength="500"></textarea>
                </label>

                <div class="actions">
                    <button type="submit" class="primary" id="submitButton">Guardar resultado</button>
                    <button type="button" class="secondary" id="clearButton">Limpiar</button>
                </div>
            </form>

            <p class="status" id="statusMessage" role="status" aria-live="polite"></p>
        </section>

        <section class="panel" aria-labelledby="table-title">
            <div class="panel-header">
                <h2 id="table-title">Historial del atleta</h2>
            </div>

            <div class="chart-wrap">
                <canvas id="graficoEvolucion"></canvas>
            </div>

            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Fecha</th>
                            <th>Tiempo</th>
                            <th>Reps</th>
                            <th>Peso</th>
                            <th>Puntuacion</th>
                            <th>Notas</th>
                        </tr>
                    </thead>
                    <tbody id="historialBody"></tbody>
                </table>
            </div>

            <div class="empty" id="emptyState">Seleccione un atleta para ver su historial.</div>
        </section>
    </main>
    <script src="../assets/js/nav.js?v=2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="../assets/js/progreso.js?v=2"></script>
</body>
</html>
