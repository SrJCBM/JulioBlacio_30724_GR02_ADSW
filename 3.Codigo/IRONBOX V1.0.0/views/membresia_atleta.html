<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>IronClad Box | Mi membresia</title>
    <link rel="stylesheet" href="../assets/css/nav.css?v=5">
    <link rel="stylesheet" href="../assets/css/app.css?v=5">
</head>
<body>
    <header>
        <h1>Mi membresia</h1>
        <p>Consulta el estado de tu plan y registra una renovacion de pago.</p>
    </header>

    <main>
        <p class="status" id="statusMessage" role="status" aria-live="polite"></p>

        <section class="panel" aria-labelledby="estado-title">
            <div class="panel-header">
                <h2 id="estado-title">Estado financiero</h2>
                <button type="button" class="primary btn-sm" id="registrarPagoButton">+ Registrar pago</button>
            </div>

            <div class="panel-body">
                <span class="badge warn" id="estadoMembresia">Sin membresia</span>

                <label for="idAtleta">Atleta activo <span class="req">*</span>
                    <select id="idAtleta">
                        <option value="">Seleccione un atleta</option>
                    </select>
                    <span class="help">Selecciona el atleta para revisar su membresia vigente.</span>
                </label>

                <div class="metrics">
                    <div class="metric">
                        <span class="metric-label">Tipo</span>
                        <strong class="metric-value" id="tipoMembresia">-</strong>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Vencimiento</span>
                        <strong class="metric-value" id="fechaVencimiento">-</strong>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Precio</span>
                        <strong class="metric-value" id="precioMembresia">-</strong>
                    </div>
                </div>

                <div class="actions">
                    <button type="button" class="secondary" id="refreshButton">Actualizar estado</button>
                </div>
            </div>
        </section>
    </main>

    <div class="drawer-scrim" id="drawerScrim"></div>
    <aside class="drawer" id="formDrawer" role="dialog" aria-modal="true" aria-labelledby="form-title" aria-hidden="true">
        <div class="drawer-header">
            <h2 id="form-title">Registrar pago</h2>
            <button type="button" class="drawer-close" id="drawerClose" aria-label="Cerrar formulario">&times;</button>
        </div>

        <form id="pagoForm" autocomplete="off">
            <label for="metodoPago">Metodo de pago <span class="req">*</span>
                <select id="metodoPago" name="metodoPago" required>
                    <option value="Tarjeta">Tarjeta</option>
                    <option value="Transferencia">Transferencia</option>
                </select>
                <span class="help">El pago se registra como simulacion para actualizar el estado.</span>
            </label>

            <label for="numeroTarjeta">Numero de tarjeta <span class="req">*</span>
                <input type="text" id="numeroTarjeta" name="numeroTarjeta" inputmode="numeric" maxlength="19" placeholder="4111 1111 1111 1111" required>
            </label>

            <div class="form-row">
                <label for="expiracion">Expiracion <span class="req">*</span>
                    <input type="text" id="expiracion" name="expiracion" maxlength="5" placeholder="MM/AA" required>
                </label>

                <label for="cvv">CVV <span class="req">*</span>
                    <input type="password" id="cvv" name="cvv" inputmode="numeric" maxlength="4" required>
                </label>
            </div>

            <div class="actions">
                <button type="submit" class="primary" id="submitButton">Confirmar pago simulado</button>
                <button type="button" class="danger" id="cancelMembershipButton">Cancelar membresia</button>
            </div>
        </form>
    </aside>

    <script src="../assets/js/nav.js?v=5"></script>
    <script src="../assets/js/membresia_atleta.js?v=5"></script>
</body>
</html>
