<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>IronClad Box | Mi membresia</title>
    <link rel="stylesheet" href="../assets/css/nav.css">
    <style>
        :root {
            --bg: #f4f6f8;
            --panel: #ffffff;
            --ink: #1f252c;
            --muted: #68717d;
            --line: #dce2e8;
            --brand: #b8232f;
            --brand-dark: #8e1923;
            --focus: #1f6feb;
            --paid: #137333;
            --pending: #945600;
            --expired: #b42318;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--ink);
            font-family: Arial, Helvetica, sans-serif;
            line-height: 1.45;
        }

        header {
            background: #20242a;
            color: #fff;
            padding: 18px clamp(16px, 4vw, 48px);
        }

        header h1 {
            margin: 0;
            font-size: clamp(1.35rem, 2vw, 2rem);
            letter-spacing: 0;
        }

        main {
            width: min(1040px, calc(100% - 32px));
            margin: 24px auto 42px;
            display: grid;
            grid-template-columns: minmax(0, 1fr) 380px;
            gap: 22px;
            align-items: start;
        }

        .panel {
            min-width: 0;
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 8px;
            box-shadow: 0 6px 18px rgba(31, 35, 40, 0.06);
        }

        .panel-header {
            padding: 18px 20px 12px;
            border-bottom: 1px solid var(--line);
        }

        .panel-header h2 {
            margin: 0;
            font-size: 1.05rem;
            letter-spacing: 0;
        }

        .content,
        form {
            padding: 18px 20px 20px;
            display: grid;
            gap: 14px;
        }

        label {
            display: grid;
            gap: 6px;
            color: var(--muted);
            font-size: 0.9rem;
            font-weight: 700;
        }

        input,
        select {
            width: 100%;
            min-height: 42px;
            border: 1px solid #c8d0da;
            border-radius: 6px;
            padding: 9px 10px;
            color: var(--ink);
            background: #fff;
            font: inherit;
        }

        input:focus,
        select:focus,
        button:focus {
            outline: 3px solid rgba(31, 111, 235, 0.22);
            outline-offset: 1px;
            border-color: var(--focus);
        }

        .metrics {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 12px;
        }

        .metric {
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 14px;
            background: #fafbfc;
        }

        .metric span {
            display: block;
            color: var(--muted);
            font-size: 0.82rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .metric strong {
            display: block;
            margin-top: 6px;
            font-size: 1.05rem;
        }

        .tag {
            display: inline-flex;
            align-items: center;
            min-height: 30px;
            width: max-content;
            border-radius: 999px;
            padding: 5px 12px;
            font-size: 0.9rem;
            font-weight: 700;
        }

        .tag.Pagado {
            color: var(--paid);
            background: #eaf5ed;
        }

        .tag.Pendiente {
            color: var(--pending);
            background: #fff5db;
        }

        .tag.Vencido {
            color: var(--expired);
            background: #fff0ef;
        }

        .tag.Cancelada {
            color: var(--muted);
            background: #eef0f3;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        button {
            min-height: 40px;
            border: 1px solid transparent;
            border-radius: 6px;
            padding: 9px 14px;
            cursor: pointer;
            font: inherit;
            font-weight: 700;
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.56;
        }

        .primary {
            background: var(--brand);
            color: #fff;
        }

        .primary:hover {
            background: var(--brand-dark);
        }

        .secondary {
            background: #fff;
            color: var(--ink);
            border-color: #c8d0da;
        }

        .danger {
            background: #b42318;
            color: #fff;
        }

        .danger:hover {
            background: #8f1d14;
        }

        .status {
            display: none;
            margin: 0 20px 18px;
            padding: 11px 12px;
            border-radius: 6px;
            font-weight: 700;
        }

        .status.show {
            display: block;
        }

        .status.ok {
            color: var(--paid);
            background: #eaf5ed;
            border: 1px solid #bddfc7;
        }

        .status.error {
            color: var(--expired);
            background: #fff0ef;
            border: 1px solid #f0b8b4;
        }

        @media (max-width: 900px) {
            main {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 620px) {
            main {
                width: min(100% - 20px, 1040px);
                margin-top: 14px;
            }

            .metrics,
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
    <link rel="stylesheet" href="../assets/css/app.css">
</head>
<body>
    <header>
        <h1>IronClad Box - Mi membresia</h1>
    </header>

    <main>
        <section class="panel" aria-labelledby="estado-title">
            <div class="panel-header">
                <h2 id="estado-title">Estado financiero</h2>
            </div>

            <div class="content">
                <label for="idAtleta">
                    Atleta activo
                    <select id="idAtleta">
                        <option value="">Seleccione un atleta</option>
                    </select>
                </label>

                <div class="metrics">
                    <div class="metric">
                        <span>Tipo</span>
                        <strong id="tipoMembresia">-</strong>
                    </div>
                    <div class="metric">
                        <span>Vencimiento</span>
                        <strong id="fechaVencimiento">-</strong>
                    </div>
                    <div class="metric">
                        <span>Precio</span>
                        <strong id="precioMembresia">-</strong>
                    </div>
                </div>

                <span class="tag Pendiente" id="estadoMembresia">Sin membresia</span>
            </div>

            <p class="status" id="statusMessage" role="status" aria-live="polite"></p>
        </section>

        <section class="panel" aria-labelledby="pago-title">
            <div class="panel-header">
                <h2 id="pago-title">Renovar membresia</h2>
            </div>

            <form id="pagoForm" autocomplete="off">
                <label for="metodoPago">
                    Metodo de pago
                    <select id="metodoPago" name="metodoPago" required>
                        <option value="Tarjeta">Tarjeta</option>
                        <option value="Transferencia">Transferencia</option>
                    </select>
                </label>

                <label for="numeroTarjeta">
                    Numero de tarjeta
                    <input type="text" id="numeroTarjeta" name="numeroTarjeta" inputmode="numeric" maxlength="19" placeholder="4111 1111 1111 1111" required>
                </label>

                <div class="form-row">
                    <label for="expiracion">
                        Expiracion
                        <input type="text" id="expiracion" name="expiracion" maxlength="5" placeholder="MM/AA" required>
                    </label>

                    <label for="cvv">
                        CVV
                        <input type="password" id="cvv" name="cvv" inputmode="numeric" maxlength="4" required>
                    </label>
                </div>

                <button type="submit" class="primary" id="submitButton">Confirmar pago simulado</button>
                <button type="button" class="danger" id="cancelMembershipButton">Cancelar membresia</button>
                <button type="button" class="secondary" id="refreshButton">Actualizar estado</button>
            </form>
        </section>
    </main>
    <script src="../assets/js/nav.js"></script>

    <script src="../assets/js/membresia_atleta.js"></script>
</body>
</html>
