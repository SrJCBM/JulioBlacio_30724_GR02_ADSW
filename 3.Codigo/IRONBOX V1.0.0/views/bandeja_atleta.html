<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>IronClad Box | Bandeja de entrada</title>
    <link rel="stylesheet" href="../assets/css/nav.css?v=5">
    <link rel="stylesheet" href="../assets/css/app.css?v=5">
</head>
<body>
    <header>
        <h1>Bandeja de entrada</h1>
        <p>Revisa los mensajes y anuncios enviados por el equipo de entrenamiento.</p>
    </header>

    <main class="split">
        <section class="col-form panel" aria-labelledby="selector-title">
            <div class="panel-header">
                <h2 id="selector-title">Atleta</h2>
            </div>

            <div class="panel-body">
                <form autocomplete="off">
                    <label for="idAtleta">Seleccione atleta <span class="req">*</span>
                        <select id="idAtleta">
                            <option value="">Seleccione atleta</option>
                        </select>
                        <span class="help">Elige un atleta para cargar sus mensajes recibidos.</span>
                    </label>

                    <div class="actions">
                        <button type="button" class="secondary" id="refreshButton">Actualizar bandeja</button>
                    </div>
                </form>
            </div>

            <p class="status" id="statusMessage" role="status" aria-live="polite"></p>
        </section>

        <section class="panel" aria-labelledby="inbox-title">
            <div class="panel-header">
                <h2 id="inbox-title">Mensajes y anuncios</h2>
            </div>

            <div class="message-list" id="mensajesBody"></div>
            <div class="empty" id="emptyState">Seleccione un atleta para ver su bandeja.</div>
        </section>
    </main>

    <script src="../assets/js/nav.js?v=5"></script>
    <script src="../assets/js/bandeja_atleta.js?v=5"></script>
</body>
</html>
