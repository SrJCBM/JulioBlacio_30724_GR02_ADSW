<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>IronClad Box | Iniciar sesión</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --forge: #16181d;      /* hierro / fondo */
            --forge-2: #1d2027;    /* superficie elevada */
            --steel: #262b33;      /* bordes de tarjeta */
            --slate: #1a201c;      /* pizarra */
            --chalk: #eceae3;      /* tiza / texto principal */
            --ash: #8a929e;        /* texto secundario */
            --ember: #e8542a;      /* acento único */
            --ember-hi: #ff6a3d;
            --danger: #ff6b5e;
            --ok: #7bc67e;
            --line: rgba(236, 234, 227, 0.12);
        }

        * { box-sizing: border-box; }

        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            padding: 24px;
            background:
                radial-gradient(1100px 520px at 12% -8%, rgba(232, 84, 42, 0.10), transparent 60%),
                radial-gradient(900px 500px at 110% 120%, rgba(232, 84, 42, 0.06), transparent 55%),
                var(--forge);
            color: var(--chalk);
            font-family: "Inter", system-ui, Arial, sans-serif;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        main {
            width: min(100%, 960px);
            display: grid;
            grid-template-columns: 1.05fr 0.95fr;
            background: var(--forge-2);
            border: 1px solid var(--steel);
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 30px 80px -30px rgba(0, 0, 0, 0.8);
        }

        /* ---------- Firma: pizarra del box ---------- */
        .board {
            position: relative;
            padding: 40px 38px;
            background:
                repeating-linear-gradient(115deg, rgba(236,234,227,0.015) 0 2px, transparent 2px 7px),
                radial-gradient(120% 120% at 80% 0%, rgba(236,234,227,0.05), transparent 55%),
                var(--slate);
            border-right: 1px solid var(--line);
            display: flex;
            flex-direction: column;
            gap: 26px;
            isolation: isolate;
        }
        .board::after {
            /* riel de tiza inferior */
            content: "";
            position: absolute;
            left: 0; right: 0; bottom: 0;
            height: 10px;
            background: linear-gradient(180deg, #2b2f2c, #0f120f);
            box-shadow: 0 -1px 0 rgba(236,234,227,0.06);
        }

        .brand {
            display: flex;
            align-items: baseline;
            gap: 12px;
        }
        .brand .mark {
            font-family: "JetBrains Mono", monospace;
            font-weight: 700;
            font-size: 0.72rem;
            letter-spacing: 0.28em;
            color: var(--ember);
            border: 1px solid rgba(232, 84, 42, 0.5);
            padding: 4px 8px;
            border-radius: 4px;
        }
        .brand h1 {
            margin: 0;
            font-family: "Oswald", sans-serif;
            font-weight: 600;
            font-size: clamp(1.9rem, 3.6vw, 2.9rem);
            letter-spacing: 0.02em;
            text-transform: uppercase;
            color: var(--chalk);
            text-shadow: 0 1px 0 rgba(0,0,0,0.3);
        }

        .eyebrow {
            font-family: "JetBrains Mono", monospace;
            font-size: 0.7rem;
            letter-spacing: 0.34em;
            text-transform: uppercase;
            color: var(--ash);
        }

        .wod {
            border-top: 1px dashed rgba(236,234,227,0.22);
            padding-top: 18px;
        }
        .wod h2 {
            margin: 0 0 4px;
            font-family: "Oswald", sans-serif;
            font-weight: 500;
            font-size: 1.35rem;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--chalk);
        }
        .wod .type {
            font-family: "JetBrains Mono", monospace;
            color: var(--ember);
            font-size: 0.82rem;
            letter-spacing: 0.12em;
            margin-bottom: 12px;
        }
        .wod ol {
            margin: 0;
            padding: 0;
            list-style: none;
            display: grid;
            gap: 9px;
        }
        .wod li {
            display: grid;
            grid-template-columns: 2.4rem 1fr;
            align-items: baseline;
            font-family: "Oswald", sans-serif;
            font-weight: 400;
            font-size: 1.12rem;
            letter-spacing: 0.03em;
            color: var(--chalk);
        }
        .wod li .reps {
            font-family: "JetBrains Mono", monospace;
            font-weight: 700;
            color: var(--ember-hi);
        }
        .board .foot {
            margin-top: auto;
            color: var(--ash);
            font-size: 0.86rem;
        }

        /* ---------- Formulario ---------- */
        .access {
            padding: 44px 40px;
            display: grid;
            align-content: center;
            gap: 18px;
        }
        .access h2 {
            margin: 0;
            font-family: "Oswald", sans-serif;
            font-weight: 600;
            font-size: 1.5rem;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }
        .access .lead {
            margin: -6px 0 8px;
            color: var(--ash);
            font-size: 0.95rem;
        }

        label {
            display: grid;
            gap: 7px;
            font-family: "JetBrains Mono", monospace;
            font-size: 0.72rem;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--ash);
        }

        .field { position: relative; }

        input {
            width: 100%;
            min-height: 46px;
            border: 1px solid var(--steel);
            border-radius: 9px;
            padding: 10px 13px;
            color: var(--chalk);
            font-family: "Inter", sans-serif;
            font-size: 1rem;
            background: var(--forge);
            transition: border-color 0.16s ease, box-shadow 0.16s ease;
        }
        input::placeholder { color: #545b66; }
        input:focus {
            outline: none;
            border-color: var(--ember);
            box-shadow: 0 0 0 3px rgba(232, 84, 42, 0.22);
        }
        input[type="password"], input#contrasena { padding-right: 74px; }

        .toggle {
            position: absolute;
            top: 50%;
            right: 8px;
            transform: translateY(-50%);
            border: 0;
            background: transparent;
            color: var(--ash);
            font-family: "JetBrains Mono", monospace;
            font-size: 0.68rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 6px 8px;
            cursor: pointer;
            border-radius: 6px;
        }
        .toggle:hover { color: var(--chalk); }
        .toggle:focus-visible { outline: 2px solid var(--ember); outline-offset: 2px; }

        button.submit {
            margin-top: 4px;
            border: 0;
            border-radius: 9px;
            padding: 13px 16px;
            cursor: pointer;
            font-family: "Oswald", sans-serif;
            font-weight: 600;
            font-size: 1.02rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #16181d;
            background: linear-gradient(180deg, var(--ember-hi), var(--ember));
            box-shadow: 0 10px 22px -8px rgba(232, 84, 42, 0.7);
            transition: transform 0.12s ease, box-shadow 0.16s ease, filter 0.16s ease;
        }
        button.submit:hover { filter: brightness(1.05); transform: translateY(-1px); }
        button.submit:active { transform: translateY(0); }
        button.submit:focus-visible { outline: 3px solid rgba(255, 106, 61, 0.6); outline-offset: 2px; }
        button.submit:disabled { opacity: 0.6; cursor: progress; filter: saturate(0.6); }

        .status {
            min-height: 20px;
            margin: 2px 0 0;
            font-family: "JetBrains Mono", monospace;
            font-size: 0.8rem;
            letter-spacing: 0.03em;
            color: var(--ash);
        }
        .status.error { color: var(--danger); }
        .status.error::before { content: "▹ "; }

        @media (max-width: 780px) {
            main { grid-template-columns: 1fr; }
            .board { border-right: 0; border-bottom: 1px solid var(--line); }
            .board .foot { display: none; }
        }

        @media (prefers-reduced-motion: reduce) {
            button.submit, input { transition: none; }
        }
    </style>
</head>
<body>
    <main>
        <section class="board" aria-labelledby="brand-title">
            <div class="brand">
                <span class="mark">RX</span>
                <h1 id="brand-title">IronClad Box</h1>
            </div>

            <p class="eyebrow">Pizarra del día</p>

            <div class="wod" aria-label="Entrenamiento del día">
                <h2>Cindy</h2>
                <p class="type">AMRAP · 20 MIN</p>
                <ol>
                    <li><span class="reps">5</span><span>Dominadas</span></li>
                    <li><span class="reps">10</span><span>Flexiones</span></li>
                    <li><span class="reps">15</span><span>Sentadillas al aire</span></li>
                </ol>
            </div>

            <p class="foot">Cada rep cuenta. Marca tu progreso, reserva tu clase y entrena con propósito.</p>
        </section>

        <form id="loginForm" class="access" autocomplete="on" novalidate>
            <h2>Iniciar sesión</h2>
            <p class="lead">Entra a tu box para gestionar clases, membresías y tu progreso.</p>

            <label for="correo">
                Correo
                <input type="email" id="correo" name="correo" placeholder="tu@correo.com" required autocomplete="username">
            </label>

            <label for="contrasena">
                Contraseña
                <span class="field">
                    <input type="password" id="contrasena" name="contrasena" placeholder="••••••••" required autocomplete="current-password">
                    <button type="button" class="toggle" id="togglePass" aria-pressed="false" aria-controls="contrasena">Ver</button>
                </span>
            </label>

            <button type="submit" class="submit" id="submitButton">Entrar al box</button>
            <p class="status" id="statusMessage" role="status" aria-live="polite"></p>
        </form>
    </main>

    <script>
        (function () {
            var input = document.getElementById('contrasena');
            var toggle = document.getElementById('togglePass');
            if (input && toggle) {
                toggle.addEventListener('click', function () {
                    var mostrar = input.type === 'password';
                    input.type = mostrar ? 'text' : 'password';
                    toggle.textContent = mostrar ? 'Ocultar' : 'Ver';
                    toggle.setAttribute('aria-pressed', String(mostrar));
                    input.focus();
                });
            }
        })();
    </script>
    <script src="../assets/js/login.js"></script>
</body>
</html>
