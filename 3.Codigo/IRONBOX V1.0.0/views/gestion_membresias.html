<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>IronClad Box | Gestion de membresias</title>
    <link rel="stylesheet" href="../assets/css/nav.css?v=5">
    <link rel="stylesheet" href="../assets/css/app.css?v=5">
</head>
<body>
    <header>
        <h1>Gestion de membresias</h1>
        <p>Asigna planes a los atletas y controla el estado de cada pago.</p>
    </header>

    <main>
        <p class="status" id="statusMessage" role="status" aria-live="polite"></p>

        <section class="panel" aria-labelledby="table-title">
            <div class="panel-header">
                <h2 id="table-title">Atletas y estado de pago</h2>
                <button type="button" class="primary btn-sm" id="nuevaMembresiaButton">+ Nueva membresia</button>
            </div>

            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Atleta</th>
                            <th>Plan</th>
                            <th>Precio</th>
                            <th>Estado</th>
                            <th>Expira</th>
                            <th>Pago</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="atletasBody"></tbody>
                </table>
            </div>

            <div class="empty" id="emptyState" hidden>No hay atletas registrados.</div>
        </section>
    </main>

    <div class="drawer-scrim" id="drawerScrim"></div>
    <aside class="drawer" id="formDrawer" role="dialog" aria-modal="true" aria-labelledby="form-title" aria-hidden="true">
        <div class="drawer-header">
            <h2 id="form-title">Crear / Asignar membresia</h2>
            <button type="button" class="drawer-close" id="drawerClose" aria-label="Cerrar formulario">&times;</button>
        </div>

        <form id="membresiaForm" autocomplete="off">
            <input type="hidden" id="membresiaId" name="id">

            <label for="idAtleta">Atleta <span class="req">*</span>
                <select id="idAtleta" name="idAtleta" required>
                    <option value="">Seleccione un atleta</option>
                </select>
            </label>

            <div class="form-row">
                <label for="tipo">Tipo de plan <span class="req">*</span>
                    <select id="tipo" name="tipo" required>
                        <option value="Básica">Básica</option>
                        <option value="Premium">Premium</option>
                        <option value="Elite">Elite</option>
                    </select>
                </label>

                <label for="precio">Precio <span class="req">*</span>
                    <input type="number" id="precio" name="precio" min="1" step="0.01" value="35.00" required>
                    <span class="help">Se sugiere segun el plan.</span>
                </label>
            </div>

            <div class="form-row">
                <label for="fechaInicio">Fecha de inicio <span class="req">*</span>
                    <input type="date" id="fechaInicio" name="fechaInicio" required>
                </label>

                <label for="estado">Estado de pago <span class="req">*</span>
                    <select id="estado" name="estado" required>
                        <option value="Pendiente">Pendiente</option>
                        <option value="Pagado">Pagado</option>
                        <option value="Vencido">Vencido</option>
                    </select>
                </label>
            </div>

            <div class="actions">
                <button type="submit" class="primary" id="submitButton">Crear / Asignar membresia</button>
                <button type="button" class="secondary" id="todayButton">Usar fecha actual</button>
                <button type="button" class="secondary" id="cancelButton" hidden>Cancelar edicion</button>
            </div>
        </form>
    </aside>

    <script src="../assets/js/nav.js?v=5"></script>
    <script src="../assets/js/membresias.js?v=5"></script>
</body>
</html>
