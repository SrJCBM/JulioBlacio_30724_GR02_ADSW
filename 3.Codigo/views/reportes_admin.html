<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>IronClad Box | Reportes administrativos</title>
    <style>
        :root {
            --bg: #f4f6f8;
            --panel: #ffffff;
            --ink: #1f252c;
            --muted: #68717d;
            --line: #dce2e8;
            --brand: #b8232f;
            --brand-dark: #8e1923;
            --focus: #1f6feb;
            --ok: #137333;
            --danger: #b42318;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--ink);
            font-family: Arial, Helvetica, sans-serif;
            line-height: 1.45;
        }

        header {
            background: #20242a;
            color: #fff;
            padding: 18px clamp(16px, 4vw, 48px);
        }

        header h1 {
            margin: 0;
            font-size: clamp(1.35rem, 2vw, 2rem);
            letter-spacing: 0;
        }

        main {
            width: min(1180px, calc(100% - 32px));
            margin: 24px auto 42px;
            display: grid;
            gap: 22px;
        }

        .panel {
            min-width: 0;
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 8px;
            box-shadow: 0 6px 18px rgba(31, 35, 40, 0.06);
        }

        .panel-header {
            padding: 18px 20px 12px;
            border-bottom: 1px solid var(--line);
        }

        .panel-header h2 {
            margin: 0;
            font-size: 1.05rem;
            letter-spacing: 0;
        }

        form {
            padding: 18px 20px 20px;
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 14px;
            align-items: end;
        }

        label {
            display: grid;
            gap: 6px;
            color: var(--muted);
            font-size: 0.9rem;
            font-weight: 700;
        }

        input,
        select {
            width: 100%;
            min-height: 42px;
            border: 1px solid #c8d0da;
            border-radius: 6px;
            padding: 9px 10px;
            color: var(--ink);
            background: #fff;
            font: inherit;
        }

        input:focus,
        select:focus,
        button:focus {
            outline: 3px solid rgba(31, 111, 235, 0.22);
            outline-offset: 1px;
            border-color: var(--focus);
        }

        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            min-height: 40px;
            border: 1px solid transparent;
            border-radius: 6px;
            padding: 9px 14px;
            cursor: pointer;
            font: inherit;
            font-weight: 700;
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.56;
        }

        .primary {
            background: var(--brand);
            color: #fff;
        }

        .primary:hover {
            background: var(--brand-dark);
        }

        .secondary {
            background: #fff;
            color: var(--ink);
            border-color: #c8d0da;
        }

        .summary {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 12px;
            padding: 18px 20px 0;
        }

        .metric {
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 14px;
            background: #fafbfc;
        }

        .metric span {
            display: block;
            color: var(--muted);
            font-size: 0.82rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .metric strong {
            display: block;
            margin-top: 6px;
            font-size: 1.05rem;
        }

        .status {
            display: none;
            margin: 0 20px 18px;
            padding: 11px 12px;
            border-radius: 6px;
            font-weight: 700;
        }

        .status.show {
            display: block;
        }

        .status.ok {
            color: var(--ok);
            background: #eaf5ed;
            border: 1px solid #bddfc7;
        }

        .status.error {
            color: var(--danger);
            background: #fff0ef;
            border: 1px solid #f0b8b4;
        }

        .table-wrap {
            width: 100%;
            overflow-x: auto;
            padding-top: 18px;
        }

        table {
            width: 100%;
            min-width: 860px;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 12px 14px;
            border-bottom: 1px solid var(--line);
            text-align: left;
            vertical-align: middle;
        }

        th {
            color: var(--muted);
            background: #fafbfc;
            font-size: 0.82rem;
            text-transform: uppercase;
            letter-spacing: 0;
        }

        .empty {
            padding: 24px 20px;
            color: var(--muted);
        }

        @media (max-width: 940px) {
            form,
            .summary {
                grid-template-columns: 1fr 1fr;
            }
        }

        @media (max-width: 620px) {
            main {
                width: min(100% - 20px, 1180px);
                margin-top: 14px;
            }

            form,
            .summary {
                grid-template-columns: 1fr;
            }

            .actions button {
                width: 100%;
            }
        }

        @media print {
            header,
            form,
            .status,
            .actions {
                display: none;
            }

            body {
                background: #fff;
            }

            main {
                width: 100%;
                margin: 0;
            }

            .panel {
                box-shadow: none;
                border: none;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>IronClad Box - Reportes administrativos</h1>
    </header>

    <main>
        <section class="panel" aria-labelledby="filters-title">
            <div class="panel-header">
                <h2 id="filters-title">Filtros del reporte</h2>
            </div>

            <form id="reporteForm">
                <label for="tipoReporte">
                    Tipo de reporte
                    <select id="tipoReporte" required>
                        <option value="Finanzas">Finanzas</option>
                        <option value="Asistencia">Asistencia</option>
                    </select>
                </label>

                <label for="fechaInicio">
                    Fecha inicio
                    <input type="date" id="fechaInicio" required>
                </label>

                <label for="fechaFin">
                    Fecha fin
                    <input type="date" id="fechaFin" required>
                </label>

                <div class="actions">
                    <button type="submit" class="primary" id="generateButton">Generar</button>
                    <button type="button" class="secondary" id="csvButton">Exportar CSV</button>
                    <button type="button" class="secondary" id="pdfButton">Exportar PDF</button>
                </div>
            </form>

            <p class="status" id="statusMessage" role="status" aria-live="polite"></p>
        </section>

        <section class="panel" aria-labelledby="results-title" id="printArea">
            <div class="panel-header">
                <h2 id="results-title">Resultados preliminares</h2>
            </div>

            <div class="summary" id="summary"></div>

            <div class="table-wrap">
                <table>
                    <thead>
                        <tr id="tableHead"></tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>

            <div class="empty" id="emptyState">Seleccione filtros y genere un reporte.</div>
        </section>
    </main>

    <script src="../assets/js/reportes_admin.js"></script>
</body>
</html>
