services:
  - type: web
    name: ironclad-box
    runtime: docker
    plan: starter
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "3306"
      - key: DB_NAME
        value: ironclad_box
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_CHARSET
        value: utf8mb4
